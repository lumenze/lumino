[project]
name = "lumino-ai-services"
version = "0.1.0"
description = "Lumino AI/ML Services — NL Matching, Relevance, Health, Translation"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.111.0",
    "uvicorn[standard]>=0.30.0",
    "pydantic>=2.7.0",
    "pydantic-settings>=2.3.0",
    "httpx>=0.27.0",
    "psycopg[binary]>=3.1.0",
    "redis>=5.0.0",
    "numpy>=1.26.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0.0", "pytest-asyncio>=0.23.0", "ruff>=0.4.0", "mypy>=1.10.0"]
ml = ["sentence-transformers>=3.0.0", "scikit-learn>=1.5.0", "torch>=2.3.0"]
cloud = ["openai>=1.30.0", "anthropic>=0.28.0"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.mypy]
python_version = "3.11"
strict = true
